# /etc/sysctl.d/99-trading.conf
# Quant system OS tuning — copy to /etc/sysctl.d/ and run: sysctl --system

# Memory: zero swap preference, keep trading data in RAM
vm.swappiness = 0
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# Network: low-latency socket tuning
net.core.busy_read = 50
net.core.busy_poll = 50
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_low_latency = 1
net.core.netdev_max_backlog = 5000
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.optmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Scheduling: reduce latency
kernel.sched_min_granularity_ns = 1000000
kernel.sched_wakeup_granularity_ns = 500000

# Reduce TCP FIN timeout (faster socket recycling)
net.ipv4.tcp_fin_timeout = 10

# Allow real-time scheduling for trading process
kernel.sched_rt_runtime_us = 950000
