# Status: experimental/candidate GitOps manifest.
# This is not the current default release path.
# ArgoCD AppProject for quant-system
# Restricts what the Application can deploy: only the quant namespace,
# only known resource kinds. Prevents accidental cluster-wide changes
# from a trading system repo.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: quant-system
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: quant-system
spec:
  description: "Quant trading system — restricted to quant namespace"

  # Only this repo can be a source
  sourceRepos:
    - https://github.com/OWNER/quant-system.git

  # Only the quant namespace on the local cluster
  destinations:
    - server: https://kubernetes.default.svc
      namespace: quant

  # Allowed resource types — no CRDs, no RBAC, no cluster-scoped surprises
  clusterResourceWhitelist:
    - group: scheduling.k8s.io
      kind: PriorityClass

  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: Secret
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Namespace
    - group: apps
      kind: Deployment
    - group: argoproj.io
      kind: Rollout
    - group: argoproj.io
      kind: AnalysisTemplate
    - group: policy
      kind: PodDisruptionBudget
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: batch
      kind: CronJob
    - group: external-secrets.io
      kind: SecretStore
    - group: external-secrets.io
      kind: ExternalSecret

  # Orphan resources warning — detect resources in the namespace not tracked by ArgoCD
  orphanedResources:
    warn: true
