# Status: experimental/candidate GitOps manifest.
# This is not the current default release path.
# Argo Rollouts Canary for quant-system
#
# TRADING-SPECIFIC CONSIDERATIONS:
# - Canary for a trading engine is higher risk than a typical web service.
#   Two replicas both placing orders can cause duplicate fills or conflicting
#   positions. The recommended pattern is:
#     1. Canary receives market data and generates signals (shadow mode)
#     2. Only the stable revision actually executes orders
#     3. Canary metrics (latency, error rate, signal quality) are compared
#        against the stable pod before promotion
#   Configure your application to check the CANARY_WEIGHT env var or pod label
#   to decide whether to execute orders or run in shadow/dry-run mode.
#
# - The 10% -> 30% -> 60% -> 100% progression with pauses gives operators
#   time to inspect canary behavior at each stage. The AnalysisTemplate runs
#   Prometheus queries automatically; if error rate spikes or fill rate drops,
#   the rollout aborts and rolls back.
#
# - antiAffinity ensures canary and stable pods land on different nodes,
#   protecting against single-node failures during the transition.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: quant-system
  namespace: quant
  labels:
    app: quant-engine
    component: trading
    app.kubernetes.io/part-of: quant-system
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: quant-engine
  strategy:
    canary:
      # Canary service receives canary-weighted traffic
      canaryService: quant-engine-canary
      stableService: quant-engine
      steps:
        # Phase 1: Shadow — 10% traffic, 5 min observation
        - setWeight: 10
        - pause: {duration: 5m}
        # Phase 2: Light canary — 30% traffic, 10 min with analysis
        - setWeight: 30
        - pause: {duration: 10m}
        # Phase 3: Heavy canary — 60% traffic, 10 min
        - setWeight: 60
        - pause: {duration: 10m}
        # Phase 4: Full promotion
        - setWeight: 100
      analysis:
        templates:
          - templateName: quant-system-analysis
        # Start analysis at step 2 (the 30% pause) — gives the canary pods
        # time to warm up and produce meaningful metrics before we judge them
        startingStep: 2
        args:
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
      # Spread canary and stable across different nodes
      antiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution: {}
  template:
    metadata:
      labels:
        app: quant-engine
        component: trading
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: quant-engine
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: engine
          image: quant-system:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          envFrom:
            - configMapRef:
                name: quant-engine-config
            - secretRef:
                name: quant-engine-secrets
          env:
            - name: QUANT_ENV
              value: "production"
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
            - name: data
              mountPath: /app/data/live
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: quant-engine-config
        - name: logs
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: quant-engine-data
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
# Canary Service — Argo Rollouts manages the selector to route traffic
# to canary pods during the progressive rollout
apiVersion: v1
kind: Service
metadata:
  name: quant-engine-canary
  namespace: quant
  labels:
    app: quant-engine
    role: canary
spec:
  selector:
    app: quant-engine
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
