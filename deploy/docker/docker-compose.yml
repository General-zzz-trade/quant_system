# Status: non-default deployment example.
# Default release truth lives at repo-root docker-compose.yml + GitHub Actions.
version: "3.8"

services:
  engine:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: paper
    container_name: quant-engine
    restart: unless-stopped
    ports:
      - "9090:9090"
    command: ["python3", "-m", "runner.live_runner", "--config", "/app/infra/config/examples/live.yaml"]
    environment:
      - QUANT_ENV=production
      - QUANT_LOG_LEVEL=INFO
      - QUANT_DB_HOST=timescaledb
      - QUANT_DB_PORT=5432
      - QUANT_DB_NAME=quant
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - engine-logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - quant-net

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: quant-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=quant
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=quant
    secrets:
      - db_password
    volumes:
      - tsdb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quant-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: quant-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - quant-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: quant-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/quant.json
    secrets:
      - grafana_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - quant-net

secrets:
  db_password:
    file: ./secrets/db_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt

volumes:
  tsdb-data:
  prometheus-data:
  grafana-data:
  engine-logs:

networks:
  quant-net:
    driver: bridge
