# Trading GRUB parameters — append to GRUB_CMDLINE_LINUX in /etc/default/grub
#
# EXISTING (already configured):
#   mitigations=off processor.max_cstate=1 idle=poll tsc=reliable
#   nosoftlockup nohz_full=1 rcu_nocbs=1 iommu=pt
#
# NEW (add these):
#   isolcpus=1        — fully isolate CPU1 from kernel scheduler
#   skew_tick=1       — reduce timer interrupt synchronization
#
# FULL LINE (copy-paste into /etc/default/grub):
# GRUB_CMDLINE_LINUX="mitigations=off processor.max_cstate=1 idle=poll tsc=reliable nosoftlockup nohz_full=1 rcu_nocbs=1 iommu=pt isolcpus=1 skew_tick=1"
#
# After editing:
#   update-grub && reboot
#
# Verify after reboot:
#   cat /sys/devices/system/cpu/isolated   # should show "1"
#   cat /proc/cmdline                      # should contain isolcpus=1
