apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotation-check
  namespace: quant
  labels:
    app: quant-engine
    component: security
spec:
  schedule: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: quant-engine
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: rotation-check
              image: quant-system:latest
              command:
                - python
                - -c
                - |
                  import os, sys, json
                  from datetime import datetime, timedelta

                  MAX_AGE_DAYS = int(os.environ.get("SECRET_MAX_AGE_DAYS", "90"))

                  # Check secret age via annotation or external metadata
                  created = os.environ.get("SECRET_CREATED_AT", "")
                  if created:
                      created_dt = datetime.fromisoformat(created)
                      age = (datetime.utcnow() - created_dt).days
                      if age > MAX_AGE_DAYS:
                          print(f"WARNING: API key is {age} days old (max: {MAX_AGE_DAYS})")
                          sys.exit(1)
                      print(f"OK: API key age {age}/{MAX_AGE_DAYS} days")
                  else:
                      print("WARNING: SECRET_CREATED_AT not set, cannot verify age")
                      sys.exit(1)
              env:
                - name: SECRET_MAX_AGE_DAYS
                  value: "90"
                - name: SECRET_CREATED_AT
                  valueFrom:
                    configMapKeyRef:
                      name: quant-engine-config
                      key: SECRET_CREATED_AT
                      optional: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          restartPolicy: Never
      backoffLimit: 1
