apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: quant-secret-store
  namespace: quant
spec:
  provider:
    # Option A: AWS Secrets Manager
    # aws:
    #   service: SecretsManager
    #   region: ap-northeast-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: quant-engine
    # Option B: Kubernetes native (for dev/staging)
    kubernetes:
      remoteNamespace: quant-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: quant-engine
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: quant-engine-secrets
  namespace: quant
  labels:
    app: quant-engine
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: quant-secret-store
    kind: SecretStore
  target:
    name: quant-engine-secrets
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app: quant-engine
          managed-by: external-secrets
      data:
        # Template renders secrets into the expected format
        EXCHANGE_API_KEY: "{{ .api_key }}"
        EXCHANGE_API_SECRET: "{{ .api_secret }}"
        EXCHANGE_PASSPHRASE: "{{ .passphrase }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: quant/exchange/api-key
    - secretKey: api_secret
      remoteRef:
        key: quant/exchange/api-secret
    - secretKey: passphrase
      remoteRef:
        key: quant/exchange/passphrase
