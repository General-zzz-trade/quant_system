# Status: candidate-production Kubernetes manifest.
# This is not the current default release path.
# ============================================================================
# HorizontalPodAutoscaler for quant-system
# ============================================================================
#
# WARNING: USE WITH CAUTION FOR LIVE TRADING WORKLOADS
#
# Running multiple replicas of a trading engine introduces the risk of
# duplicate orders — each replica may independently observe the same signal
# and submit the same trade. This HPA is provided for completeness but
# should only be enabled when the application layer guarantees idempotent
# order submission (e.g., dedup via order-id or leader-election).
#
# Recommendation: for live trading, prefer Argo Rollouts with a canary
# strategy over raw HPA. Canary gives you controlled traffic shifting and
# rollback without the multi-instance concurrency hazard. Reserve HPA for
# stateless read-only workloads (backtesting, feature computation, etc.).
# ============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quant-system
  namespace: quant
  labels:
    app.kubernetes.io/name: quant-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quant-engine
  # -------------------------------------------------------------------------
  # maxReplicas is intentionally conservative. In a trading system, every
  # replica can act on the same market signal simultaneously. Without
  # application-level deduplication, scaling beyond a small number of pods
  # risks sending duplicate or conflicting orders to the exchange.
  # -------------------------------------------------------------------------
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      # Wait 5 minutes before adding a pod. Short-lived CPU spikes (e.g.,
      # end-of-bar feature computation) should not trigger scale-up.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleDown:
      # Wait 10 minutes before removing a pod. A longer window protects
      # against scaling down while open positions are still being managed
      # by the replica that is about to be terminated.
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 600
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
