# Status: candidate-production Kubernetes manifest.
# This is not the current default release path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-engine
  namespace: quant
  labels:
    app: quant-engine
    component: trading
spec:
  replicas: 2  # HA: leader election ensures only 1 active
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: quant-engine
  template:
    metadata:
      labels:
        app: quant-engine
        component: trading
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: quant-engine
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: engine
          image: quant-system:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          envFrom:
            - configMapRef:
                name: quant-engine-config
            - secretRef:
                name: quant-engine-secrets
          env:
            - name: QUANT_ENV
              value: "production"
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12  # 60s max startup
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
            - name: data
              mountPath: /app/data/live
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: quant-engine-config
        - name: logs
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: quant-engine-data
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: quant-engine
  namespace: quant
  labels:
    app: quant-engine
spec:
  selector:
    app: quant-engine
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
