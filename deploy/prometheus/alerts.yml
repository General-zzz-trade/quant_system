groups:
  - name: quant_system_alerts
    rules:
      - alert: MarketDataStale
        expr: quant_market_data_age_seconds > 120
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Market data stale for {{ $labels.instance }}"
          description: "Market data age exceeds 120s (current: {{ $value }}s)"

      - alert: HighPipelineLatency
        expr: histogram_quantile(0.99, rate(quant_pipeline_latency_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Pipeline P99 latency exceeds 5s"
          description: "Pipeline P99 latency is {{ $value }}s"

      - alert: KillSwitchTriggered
        expr: quant_kill_switch_active == 1
        labels:
          severity: critical
        annotations:
          summary: "Kill switch triggered — trading halted"

      - alert: MarginRatioCritical
        expr: quant_margin_ratio < 0.08
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Margin ratio below 8%"
          description: "Current margin ratio: {{ $value }}"

      - alert: PositionDriftDetected
        expr: quant_reconcile_drift_count > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Position drift detected during reconciliation"
          description: "{{ $value }} drift(s) detected"

      - alert: HighOrderRejectionRate
        expr: rate(quant_order_rejections_total[5m]) / (rate(quant_orders_total[5m]) + 1e-10) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Order rejection rate exceeds 10%"
          description: "Current rejection rate: {{ $value }}"

      - alert: HighDrawdown
        expr: quant_drawdown_pct > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Portfolio drawdown exceeds 10%"
          description: "Current drawdown: {{ $value }}%"

      - alert: ReconcileFailed
        expr: quant_reconcile_failures_total > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Reconciliation failure detected"
          description: "{{ $value }} reconcile failure(s)"

      - alert: ModelDriftDetected
        expr: quant_model_drift_severity > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Model concept drift detected"
          description: "Drift severity: {{ $value }}"

      - alert: DataStaleFreshness
        expr: quant_data_freshness_age_hours > 2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Data source is stale"
          description: "{{ $labels.source }} age: {{ $value }}h"

      - alert: HighInferenceLatency
        expr: histogram_quantile(0.99, rate(quant_inference_latency_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Inference P99 latency exceeds 500ms"
          description: "Model {{ $labels.model }} P99 latency: {{ $value }}s"

      - alert: ModelScoreStale
        expr: time() - quant_ml_score > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No new ml_score output for 5 minutes"
          description: "Model {{ $labels.model }} last score update > 5m ago"

      - alert: InferenceErrors
        expr: rate(quant_inference_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML inference errors detected"
          description: "Model {{ $labels.model }}: {{ $value }} errors/sec"
