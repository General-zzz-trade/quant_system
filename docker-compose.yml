x-paper-base: &paper-base
  build:
    context: .
    target: paper
  image: quant-paper:latest
  env_file: .env
  environment:
    - QUANT_ALLOW_UNSIGNED_MODELS=1
    - PYTHONUNBUFFERED=1
    - PYTHONOPTIMIZE=1
    - PYTHONDONTWRITEBYTECODE=1
    - MALLOC_ARENA_MAX=2
    - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libjemalloc.so.2
  restart: unless-stopped
  network_mode: host
  cap_add:
    - SYS_NICE
  ulimits:
    memlock:
      soft: -1
      hard: -1
  volumes:
    - ./models_v8:/app/models_v8:ro
    - ./data_files:/app/data_files:ro
    - ./logs:/app/logs
    # Hot-mount Python source — edit code without rebuilding
    - ./alpha:/app/alpha:ro
    - ./engine:/app/engine:ro
    - ./event:/app/event:ro
    - ./execution:/app/execution:ro
    - ./features:/app/features:ro
    - ./infra:/app/infra:ro
    - ./monitoring:/app/monitoring:ro
    - ./runner:/app/runner:ro
    - ./scripts:/app/scripts:ro
    - ./state:/app/state:ro
    - ./strategies:/app/strategies:ro
  healthcheck:
    test: ["CMD", "python3", "-c", "import os,sys; sys.exit(0 if any('testnet_validation' in open(f'/proc/{p}/cmdline','rb').read().decode(errors='ignore') for p in os.listdir('/proc') if p.isdigit()) else 1)"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  # ══════════════════════════════════════════════════════════
  # DEFAULT PRODUCTION: alpha-runner (see docs/deploy_truth.md)
  # CANDIDATE: trader-rust, paper-multi (not auto-deployed)
  # ══════════════════════════════════════════════════════════

  # ── Rust Trader (TestNet) — CANDIDATE, standalone Rust binary ─
  trader-rust:
    build:
      context: .
      dockerfile: Dockerfile.trader
      target: trader
    image: quant-trader-rust:latest
    env_file: .env
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./models_v8:/app/models_v8:ro
      - ./ext/rust/config.testnet.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Paper Trading (TestNet) — STOPPED, single process, all symbols ─
  paper-multi:
    <<: *paper-base
    command: >
      chrt -f 50 nice -n -10 python3 -m runner.testnet_validation
      --config /app/infra/config/examples/testnet_multi_gate_v2.yaml
      --phase paper --duration 0
    cpuset: "1"
    mem_swappiness: 0
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 384M

  # ── Alpha Runner — DEFAULT PRODUCTION SERVICE ────────────────
  alpha-runner:
    <<: *paper-base
    command: >
      python3 -m scripts.run_bybit_alpha
      --symbols ETHUSDT ETHUSDT_15m SUIUSDT AXSUSDT --ws
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Monitoring ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]

volumes:
  prometheus_data:
  grafana_data:
