version: "3.8"

services:
  quant-paper:
    build:
      context: .
      target: paper
    env_file: .env
    environment:
      - BYBIT_BASE_URL=https://api-demo.bybit.com
    volumes:
      - ./data_files:/app/data_files:ro
      - ./models_v8:/app/models_v8:ro
      - ./logs:/app/logs
    restart: unless-stopped

  quant-live:
    build:
      context: .
      target: live
    env_file: .env
    environment:
      - BYBIT_BASE_URL=https://api.bybit.com
    volumes:
      - ./data_files:/app/data_files:ro
      - ./models_v8:/app/models_v8:ro
      - ./logs:/app/logs
    restart: unless-stopped
    profiles:
      - live  # Only starts with: docker compose --profile live up
