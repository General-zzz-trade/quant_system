version: "3.8"

services:
  quant-paper:
    image: quant-paper:latest
    build:
      context: .
      target: paper
    command: ["python3", "-m", "scripts.run_bybit_alpha", "--symbols", "BTCUSDT", "ETHUSDT", "ETHUSDT_15m", "SUIUSDT", "AXSUSDT", "--ws", "--dry-run"]
    env_file: .env
    environment:
      - BYBIT_BASE_URL=https://api-demo.bybit.com
    volumes:
      - ./data_files:/app/data_files:ro
      - ./models_v8:/app/models_v8:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import importlib; importlib.import_module('_quant_hotpath'); importlib.import_module('scripts.run_bybit_alpha')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  quant-live:
    image: quant-live:latest
    build:
      context: .
      target: live
    command: ["python3", "-m", "scripts.run_bybit_alpha", "--symbols", "BTCUSDT", "ETHUSDT", "ETHUSDT_15m", "SUIUSDT", "AXSUSDT", "--ws"]
    env_file: .env
    environment:
      - BYBIT_BASE_URL=https://api.bybit.com
    volumes:
      - ./data_files:/app/data_files:ro
      - ./models_v8:/app/models_v8:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import importlib; importlib.import_module('_quant_hotpath'); importlib.import_module('scripts.run_bybit_alpha')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    profiles:
      - live  # Only starts with: docker compose --profile live up

  # Experimental: LiveRunner framework path (not current production)
  quant-framework:
    image: quant-framework:latest
    build:
      context: .
      target: paper
    command: ["python3", "-m", "runner.live_runner", "--config", "/app/infra/config/examples/live.yaml"]
    env_file: .env
    environment:
      - BYBIT_BASE_URL=https://api-demo.bybit.com
    volumes:
      - ./data_files:/app/data_files:ro
      - ./models_v8:/app/models_v8:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import importlib; importlib.import_module('runner.live_runner')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    profiles:
      - framework  # Only starts with: docker compose --profile framework up
