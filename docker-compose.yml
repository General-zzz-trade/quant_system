x-paper-base: &paper-base
  build:
    context: .
    target: paper
  image: quant-paper:latest
  env_file: .env
  environment:
    - QUANT_ALLOW_UNSIGNED_MODELS=1
    - PYTHONUNBUFFERED=1
  restart: unless-stopped
  volumes:
    - ./models_v8:/app/models_v8:ro
    - ./data_files:/app/data_files:ro
    - ./logs:/app/logs
    # Hot-mount Python source — edit code without rebuilding
    - ./alpha:/app/alpha:ro
    - ./engine:/app/engine:ro
    - ./event:/app/event:ro
    - ./execution:/app/execution:ro
    - ./features:/app/features:ro
    - ./infra:/app/infra:ro
    - ./monitoring:/app/monitoring:ro
    - ./runner:/app/runner:ro
    - ./scripts:/app/scripts:ro
    - ./state:/app/state:ro
    - ./strategies:/app/strategies:ro
  healthcheck:
    test: ["CMD", "python3", "-c", "import os,sys; sys.exit(0 if any('testnet_validation' in open(f'/proc/{p}/cmdline','rb').read().decode(errors='ignore') for p in os.listdir('/proc') if p.isdigit()) else 1)"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  # ── Paper Trading (TestNet) ──────────────────────────────
  paper-btc:
    <<: *paper-base
    command: >
      python3 -m runner.testnet_validation
      --config /app/infra/config/examples/testnet_btc_gate_v2.yaml
      --phase paper --duration 0

  paper-sol:
    <<: *paper-base
    command: >
      python3 -m runner.testnet_validation
      --config /app/infra/config/examples/testnet_sol_gate_v2.yaml
      --phase paper --duration 0

  paper-eth:
    <<: *paper-base
    command: >
      python3 -m runner.testnet_validation
      --config /app/infra/config/examples/testnet_eth_gate_v2.yaml
      --phase paper --duration 0

  # ── Monitoring ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]

volumes:
  prometheus_data:
  grafana_data:
