services:
  live-trader:
    build:
      context: .
      target: live
    env_file: .env
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./data/live:/app/data/live
      - ./models:/app/models
    command: >
      python3 -m runner.live_runner
      --config /app/infra/config/examples/live.yaml
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 10s
      retries: 3

  paper-trader:
    build:
      context: .
      target: live
    env_file: .env
    restart: unless-stopped
    volumes:
      - paper-output:/app/output
    profiles: ["paper"]
    command: >
      python3 -m runner.paper_runner
      --mode live
      --symbol BTCUSDT
      --balance 10000
      --out /app/output

  backtest:
    build:
      context: .
      target: ml
    volumes:
      - ./data_files:/app/data_files:ro
      - backtest-output:/app/output
    profiles: ["research"]
    command: >
      python3 -m runner.backtest_runner
      --csv /app/data_files/bars.csv
      --symbol BTCUSDT
      --out /app/output

  tests:
    build:
      context: .
      target: dev
    profiles: ["dev"]
    command: python3 -m pytest tests_unit/ -x -q

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    profiles: ["monitoring"]
    depends_on:
      - live-trader

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]
    depends_on:
      - prometheus

volumes:
  paper-output:
  backtest-output:
  prometheus_data:
  grafana_data:
