# quant_trader example config
# Usage: quant_trader --config config.yaml [--dry-run]

trading:
  symbols: ["BTCUSDT"]
  exchange: binance
  testnet: true
  mode: paper
  starting_balance: 10000.0
  currency: USDT

strategy:
  deadzone: 0.5
  min_hold: 0
  long_only: false
  trend_follow: false
  trend_threshold: 0.0
  trend_indicator: tf4h_close_vs_ma20
  max_hold: 120
  monthly_gate: false
  monthly_gate_window: 480
  vol_feature: atr_norm_14
  bear_thresholds: []

position_sizing:
  fraction: 0.02
  lot_sizes:
    BTCUSDT: 0.001
    ETHUSDT: 0.01
    SOLUSDT: 0.1

risk:
  max_leverage: 5.0
  max_drawdown_pct: 0.30
  max_position_notional: 5000.0
  max_daily_orders: 100
  max_order_notional: 2000.0

credentials:
  api_key: "YOUR_API_KEY"
  api_secret: "YOUR_API_SECRET"

models:
  BTCUSDT:
    model_path: "models_v8/btc_model.json"
    ensemble_paths: []
    ensemble_weights: []

logging:
  level: info
  json: false
