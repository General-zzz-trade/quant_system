# BTC V8 gate_v2 Paper Trading (no gate, no bear — kernel-optimized)
# Kernel backtest: Sharpe 3.65, Return +34.64%, DD -11.7%
# Signal constraints loaded from models_v8/BTCUSDT_gate_v2/config.json

trading:
  symbols: [BTCUSDT]
  exchange: binance
  testnet: true
  mode: live

strategy:
  model_path: models_v8/BTCUSDT_gate_v2
  threshold: 0.0001
  threshold_short: 0.0001
  risk_pct: 0.60           # 2x target leverage (Half-Kelly: BTC 3.3x)
  order_qty: "0.001"
  monthly_gate: false

risk:
  max_position_notional: 1000.0
  max_leverage: 2.0
  max_drawdown_pct: 5.0
  max_orders_per_minute: 10

execution:
  fee_bps: 4.0
  slippage_bps: 2.0

credentials:
  api_key_env: BINANCE_TESTNET_API_KEY
  api_secret_env: BINANCE_TESTNET_API_SECRET

logging:
  level: DEBUG
  structured: true
  file: logs/paper_trading_v2.log

monitoring:
  health_check_interval: 30.0
