# ML Strategy Testnet Validation
# Runs mod_reg_1h model on Binance Futures Testnet.
# Register at https://testnet.binancefuture.com/ for API keys.

trading:
  symbols: [BTCUSDT]
  exchange: binance
  testnet: true
  mode: live

strategy:
  model_path: output/v3_validation/models
  config_name: mod_reg_1h
  threshold: 0.0001
  threshold_short: 999.0   # long-only
  risk_pct: 0.30
  order_qty: "0.001"        # minimal size for testnet

risk:
  max_position_notional: 500.0
  max_leverage: 2.0
  max_drawdown_pct: 5.0
  max_orders_per_minute: 10

execution:
  fee_bps: 4.0
  slippage_bps: 2.0

credentials:
  api_key_env: BINANCE_TESTNET_API_KEY
  api_secret_env: BINANCE_TESTNET_API_SECRET

logging:
  level: DEBUG
  structured: true
  file: logs/testnet_ml_validation.log

monitoring:
  health_check_interval: 30.0
