name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, quant-server]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DEPLOY_SERVICES: quant-paper

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect change type
        id: changes
        run: |
          PREV=$(cat .last_good_deploy 2>/dev/null || git rev-parse HEAD~1)
          CHANGED=$(git diff --name-only "$PREV" HEAD || true)
          if echo "$CHANGED" | grep -qE "^(ext/|Dockerfile|Makefile|pyproject\.toml)"; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
          fi
          echo "prev_commit=$PREV" >> "$GITHUB_OUTPUT"
          echo "Changes since $PREV:"
          echo "$CHANGED"

      - name: Guard deploy scope
        id: scope_guard
        run: |
          PREV="${{ steps.changes.outputs.prev_commit }}"
          CHANGED="$(git diff --name-only "$PREV" HEAD || true)"
          printf '%s\n' "$CHANGED" | python3 -m scripts.check_deploy_scope --guard-changed-files-stdin

      - name: Backup image (if rebuilding)
        if: steps.changes.outputs.needs_rebuild == 'true'
        run: |
          if docker image inspect quant-paper:latest >/dev/null 2>&1; then
            docker tag quant-paper:latest quant-paper:rollback
            echo "Backed up quant-paper:latest -> quant-paper:rollback"
          fi

      - name: Docker build
        id: docker_build
        if: steps.changes.outputs.needs_rebuild == 'true'
        run: docker compose build --no-cache

      - name: Rolling deploy
        id: rolling_deploy
        run: bash scripts/deploy.sh $DEPLOY_SERVICES

      - name: Record successful deploy
        if: success()
        run: git rev-parse HEAD > .last_good_deploy

      - name: Rollback on failure
        if: ${{ failure() && steps.rolling_deploy.conclusion == 'failure' }}
        run: |
          echo "Deploy failed; rolling back"
          PREV="${{ steps.changes.outputs.prev_commit }}"
          read -r -a SERVICES <<< "${DEPLOY_SERVICES:-quant-paper}"
          # Restore rollback image if we rebuilt
          if docker image inspect quant-paper:rollback >/dev/null 2>&1; then
            docker tag quant-paper:rollback quant-paper:latest
            echo "Restored quant-paper:rollback -> quant-paper:latest"
          fi
          # Recreate the deployed compose services so they pick up the restored image.
          for svc in "${SERVICES[@]}"; do
            docker compose up -d --no-deps --force-recreate "$svc" || true
          done
          # Notify
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"*[DEPLOY FAILED]* Rolled back to ${PREV}\n$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"parse_mode\":\"Markdown\"}" || true
          fi
