name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (live)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: live
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Build and push (ml)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ml
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ml:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ml:${{ github.ref_name }}

  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (live image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Post-deploy smoke test
        run: |
          python -c "
          from runner.live_runner import LiveRunner
          from engine.coordinator import EngineCoordinator, CoordinatorConfig
          from portfolio.allocator import TargetWeightAllocator, EqualWeightAllocator, VolTargetAllocator
          from risk.correlation_computer import CorrelationComputer
          from attribution.tracker import AttributionTracker
          print('All critical imports OK')
          "

  # GitOps: sync ArgoCD application on release events.
  # ArgoCD watches the repo for drift, but an explicit sync after a release
  # ensures the new image tag is rolled out immediately via canary.
  argocd-sync:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Sync ArgoCD Application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync quant-system \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --revision ${{ github.ref_name }}
          argocd app wait quant-system \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --timeout 600
