name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run unit tests
        run: python -m pytest tests_unit/ -x -q --tb=short

      - name: Run integration tests
        run: python -m pytest tests/ -x -q --tb=short --ignore=tests/performance --cov=. --cov-report=xml --cov-fail-under=60

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: pip install -e ".[dev]"

      - name: Ruff check (strict)
        run: ruff check --select E,W,F,I,N,UP,B,A,C4,SIM,TCH .

      - name: Mypy (strict)
        run: mypy --ignore-missing-imports --disallow-untyped-defs --warn-return-any --warn-unused-configs .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: pip-audit (dependency vulnerability scan)
        run: |
          pip install pip-audit
          pip-audit --strict --desc

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target live -t quant-system:latest .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "quant-system:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
