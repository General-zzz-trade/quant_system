name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: [self-hosted, quant-server]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build CI image
        run: |
          docker build --target ci -t quant-ci:test .

      - name: Build default runtime image
        run: |
          docker build --target paper -t quant-ci:paper .

      - name: Validate default compose
        run: |
          cp .env.example .env
          trap 'rm -f .env' EXIT
          docker compose config >/dev/null

      - name: Smoke default deploy path
        env:
          COMPOSE_PROJECT_NAME: quant-ci-smoke-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          bash scripts/ci_default_release_smoke.sh

      - name: Run Python tests
        run: |
          # NOTE: Slow tests (@pytest.mark.slow) and benchmarks (@pytest.mark.benchmark)
          # are excluded via pytest.ini addopts: -m "not benchmark and not slow".
          # This keeps CI under ~30s. Slow tests (parity, NN, XGB) should be run
          # manually or in a scheduled job: pytest tests/ -x -q -m ""
          # The --ignore=tests/performance below excludes benchmark fixtures/data.
          docker run --rm -v "$PWD":/app -w /app quant-ci:test \
            python -m pytest tests/ -x -q --tb=short \
            --ignore=tests/performance \
            --cov=. --cov-report=term-missing --cov-fail-under=57

      # NOTE: CI does not currently test runner.live_runner (production entry point).
      # The smoke test validates runner.testnet_validation (paper trading path).
      # To test live_runner locally: python3 -m pytest tests/integration/test_production_integration_e2e.py -x -q
      # Full live_runner CI coverage requires: production config + model files + mock venue.

      - name: Run execution tests
        run: |
          docker run --rm -v "$PWD":/app -w /app quant-ci:test \
            python -m pytest execution/tests/ -x -q --tb=short

      - name: Run Rust tests
        run: |
          docker run --rm -v "$PWD":/app -w /app quant-ci:test \
            sh -lc 'cargo test --manifest-path /app/ext/rust/Cargo.toml --locked'

  lint:
    runs-on: [self-hosted, quant-server]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Ruff check
        run: |
          docker build --target ci -t quant-ci:lint .
          docker run --rm -v "$PWD":/app -w /app quant-ci:lint \
            ruff check --select E,W,F .
