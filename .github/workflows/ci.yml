name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install "ruff>=0.4"

      - name: Ruff check (core modules)
        run: |
          ruff check --select E,W,F \
            decision/ engine/ event/ state/ execution/ features/ \
            risk/ alpha/ attribution/ runner/ \
            monitoring/ infra/ strategy/ polymarket/

  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Rust tests
        run: cargo test

  python-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rust-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Python dependencies
        run: |
          pip install maturin
          pip install \
            "pytest>=7.4" "pytest-cov>=4.1" \
            "pandas>=2.1,<3.0" "numpy>=1.26,<3.0" \
            "scikit-learn>=1.4" "lightgbm>=4.1" \
            "websocket-client>=1.6" "python-dotenv>=1.0" \
            "scipy>=1.10" "aiohttp>=3.9"

      - name: Build Rust extension
        run: |
          maturin build --release --features python --out dist/
          pip install dist/*.whl --force-reinstall
          mkdir -p _quant_hotpath
          cp $(python3 -c "import _quant_hotpath, os; print(os.path.dirname(_quant_hotpath.__file__))")/*.so _quant_hotpath/ 2>/dev/null || true
          python3 -c "import _quant_hotpath; print(len(dir(_quant_hotpath)), 'exports')"

      - name: Run core unit tests
        run: |
          python3 -m pytest \
            tests/unit/decision/ \
            tests/unit/state/ \
            tests/unit/event/ \
            tests/unit/engine/ \
            tests/unit/bybit/ \
            tests/unit/infra/test_model_signing.py \
            -x -q --tb=short

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn 'BYBIT_API_KEY\s*=' --include='*.py' . \
            | grep -v '.env' | grep -v 'example' | grep -v 'os.environ' \
            | grep -v '.gitignore' | grep -q . || true
          ! grep -rn 'BYBIT_API_SECRET\s*=' --include='*.py' . \
            | grep -v '.env' | grep -v 'example' | grep -v 'os.environ' \
            | grep -v '.gitignore' | grep -q . || true

      - name: Check for private keys in repo
        run: |
          if find . -name '*.pem' -o -name '*.key' -o -name '*.p12' \
            | grep -v node_modules | grep -v '.gitignore' | head -1 | grep -q .; then
            echo "FAIL: Private key files found in repo"
            exit 1
          fi
