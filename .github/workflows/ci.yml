name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: [self-hosted, quant-server]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run tests in Docker builder
        run: |
          docker build --target builder -t quant-ci:test .
          docker run --rm quant-ci:test \
            python -m pytest tests/ -x -q --tb=short \
            --ignore=tests/performance \
            --cov=. --cov-report=term-missing --cov-fail-under=57

  lint:
    runs-on: [self-hosted, quant-server]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Ruff check
        run: |
          docker build --target builder -t quant-ci:lint .
          docker run --rm quant-ci:lint \
            ruff check --select E,W,F .
