name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install "ruff>=0.4"

      - name: Ruff check
        run: ruff check --select E,W,F .

  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Rust tests
        run: cargo test --locked

  python-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rust-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Python dependencies
        run: |
          pip install maturin
          pip install \
            "pytest>=7.4" "pytest-cov>=4.1" "pytest-timeout>=2.1" \
            "pandas>=2.1,<3.0" "numpy>=1.26,<3.0" "pyarrow>=14.0" \
            "scikit-learn>=1.4" "lightgbm>=4.1" \
            "websocket-client>=1.6" "python-dotenv>=1.0" \
            "pyyaml>=6.0" "scipy>=1.10" \
            "aiohttp>=3.9" "websockets>=12.0" \
            "prometheus-client>=0.19"

      - name: Build Rust extension
        run: |
          maturin build --release --features python --out dist/
          pip install dist/*.whl --force-reinstall
          mkdir -p _quant_hotpath
          cp $(python3 -c "import _quant_hotpath, os; print(os.path.dirname(_quant_hotpath.__file__))")/*.so _quant_hotpath/ 2>/dev/null || true
          python3 -c "import _quant_hotpath; print(len(dir(_quant_hotpath)), 'exports')"

      - name: Run unit tests
        run: |
          python3 -m pytest tests/ -x -q --tb=short \
            --ignore=tests/performance \
            --cov=. --cov-report=term-missing --cov-fail-under=70

      - name: Run execution tests
        run: |
          python3 -m pytest execution/tests/ -x -q --tb=short

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          # Fail if API keys are hardcoded (not loaded from env)
          ! grep -rn 'BYBIT_API_KEY\s*=' --include='*.py' . \
            | grep -v '.env' | grep -v 'example' | grep -v 'os.environ' | grep -v '.gitignore' || exit 0
          ! grep -rn 'BYBIT_API_SECRET\s*=' --include='*.py' . \
            | grep -v '.env' | grep -v 'example' | grep -v 'os.environ' | grep -v '.gitignore' || exit 0

      - name: Check for private keys in repo
        run: |
          # Fail if private key material is checked in
          if find . -name '*.pem' -o -name '*.key' -o -name '*.p12' | grep -v '.gitignore' | head -1 | grep -q .; then
            echo "FAIL: Private key files found in repo"
            exit 1
          fi
